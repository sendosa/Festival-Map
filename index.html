<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1a1a;
      --muted: #6b6860;
      --accent: #c0392b;
      --accent-light: #f9ecea;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ── Toggle ── */
    .toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .toggle button {
      padding: 0.35rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 500;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Main ── */
    main { flex: 1; display: flex; flex-direction: column; }

    .view { display: none; flex: 1; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Calendar view ── */
    #calendar-view { padding: 1.25rem; gap: 1.25rem; }

    .months-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .month-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .month-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .month-card.selected { border-color: var(--accent); background: var(--accent-light); }

    .month-card .month-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .month-card .event-count {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .month-card .event-count.has-events { color: var(--accent); font-weight: 500; }

    /* ── Event list ── */
    .event-list-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .event-list-section h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.85rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .event-list { list-style: none; }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .event-item:last-child { border-bottom: none; }
    .event-item:hover { background: var(--bg); }

    .event-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 5px;
      flex-shrink: 0;
    }

    .event-item .info { flex: 1; min-width: 0; }

    .event-item .ev-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .event-item .ev-location {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .event-list-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Map view ── */
    #map-view { position: relative; }
    #map { flex: 1; width: 100%; min-height: 0; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 500;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
    }

    @media (min-width: 600px) {
      .modal-backdrop { align-items: center; }
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 85dvh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      animation: slide-up 0.2s ease;
    }

    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1.25rem 1.25rem 0.75rem;
      gap: 1rem;
    }

    .modal-header h3 { font-size: 1.15rem; font-weight: 700; line-height: 1.3; }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--bg);
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0 1.25rem 0.85rem;
    }

    .modal-tag {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .modal-tag.accent { background: var(--accent-light); border-color: #e8b4af; color: var(--accent); }

    .modal-body {
      padding: 0 1.25rem 1.5rem;
      font-size: 0.9rem;
      line-height: 1.65;
      color: #333;
    }

    /* ── Leaflet popup tweaks ── */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
    }

    .popup-inner { min-width: 140px; }
    .popup-inner strong { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .popup-inner span { font-size: 0.78rem; color: var(--muted); display: block; }
    .popup-inner a {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .popup-inner a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Festival Map</h1>
  <div class="toggle">
    <button id="btn-calendar" class="active" onclick="showView('calendar')">Calendar</button>
    <button id="btn-map" onclick="showView('map')">Map</button>
  </div>
</header>

<main>

  <!-- Calendar view -->
  <div id="calendar-view" class="view active">
    <div class="months-grid" id="months-grid"></div>
    <div class="event-list-section" id="event-list-section" style="display:none">
      <h2 id="event-list-title"></h2>
      <ul class="event-list" id="event-list"></ul>
    </div>
  </div>

  <!-- Map view -->
  <div id="map-view" class="view">
    <div id="map"></div>
  </div>

</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-name"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-desc"></div>
  </div>
</div>

  const MONTH_NAMES = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  let selectedMonth = null;
  let mapInitialized = false;

  // ── View toggle ──────────────────────────────────────────────
  function showView(view) {
    document.getElementById('calendar-view').classList.toggle('active', view === 'calendar');
    document.getElementById('map-view').classList.toggle('active', view === 'map');
    document.getElementById('btn-calendar').classList.toggle('active', view === 'calendar');
    document.getElementById('btn-map').classList.toggle('active', view === 'map');

    if (view === 'map' && !mapInitialized) initMap();
  }

  // ── Calendar ─────────────────────────────────────────────────
  function buildCalendar() {
    const grid = document.getElementById('months-grid');
    MONTH_NAMES.forEach((name, i) => {
      const month = i + 1;
      const count = EVENTS.filter(e => e.month === month).length;
      const card = document.createElement('div');
      card.className = 'month-card';
      card.dataset.month = month;
      card.innerHTML = `
        <div class="month-name">${name}</div>
        <div class="event-count ${count ? 'has-events' : ''}">${count ? count + ' event' + (count > 1 ? 's' : '') : 'No events'}</div>
      `;
      card.addEventListener('click', () => selectMonth(month));
      grid.appendChild(card);
    });
  }

  function selectMonth(month) {
    if (selectedMonth === month) {
      selectedMonth = null;
      document.querySelectorAll('.month-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('event-list-section').style.display = 'none';
      return;
    }
    selectedMonth = month;
    document.querySelectorAll('.month-card').forEach(c => {
      c.classList.toggle('selected', +c.dataset.month === month);
    });
    renderEventList(month);
  }

  function renderEventList(month) {
    const section = document.getElementById('event-list-section');
    const title = document.getElementById('event-list-title');
    const list = document.getElementById('event-list');

    const events = EVENTS.filter(e => e.month === month);
    title.textContent = MONTH_NAMES[month - 1];
    list.innerHTML = '';

    if (!events.length) {
      list.innerHTML = '<li class="event-list-empty">No events this month.</li>';
    } else {
      events.forEach(ev => {
        const li = document.createElement('li');
        li.className = 'event-item';
        li.innerHTML = `
          <div class="dot"></div>
          <div class="info">
            <div class="ev-name">${ev.name}</div>
            <div class="ev-location">${ev.city}, ${ev.country}</div>
          </div>
        `;
        li.addEventListener('click', () => openModal(ev));
        list.appendChild(li);
      });
    }

    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Map ───────────────────────────────────────────────────────
  function initMap() {
    mapInitialized = true;
    const map = L.map('map', { center: [50, 15], zoom: 4 });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const icon = L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;background:#c0392b;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6],
      popupAnchor: [0, -8]
    });

    EVENTS.forEach(ev => {
      const marker = L.marker([ev.lat, ev.lng], { icon }).addTo(map);
      const popupHtml = `
        <div class="popup-inner">
          <strong>${ev.name}</strong>
          <span>${ev.city}, ${ev.country}</span>
          <span>${MONTH_NAMES[ev.month - 1]}</span>
          <a href="#" onclick="openModalById('${encodeURIComponent(ev.name)}');return false;">Read more →</a>
        </div>
      `;
      marker.bindPopup(popupHtml, { maxWidth: 220 });
    });
  }

  function openModalById(encodedName) {
    const name = decodeURIComponent(encodedName);
    const ev = EVENTS.find(e => e.name === name);
    if (ev) openModal(ev);
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openModal(ev) {
    document.getElementById('modal-name').textContent = ev.name;
    document.getElementById('modal-desc').textContent = ev.description;

    const meta = document.getElementById('modal-meta');
    meta.innerHTML = `
      <span class="modal-tag accent">${MONTH_NAMES[ev.month - 1]}</span>
      <span class="modal-tag">${ev.city}</span>
      <span class="modal-tag">${ev.region}</span>
      <span class="modal-tag">${ev.country}</span>
    `;

    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal-backdrop') && e.type !== 'click') return;
    if (e && e.currentTarget === document.getElementById('modal-backdrop') && e.target !== e.currentTarget) return;
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Init ──────────────────────────────────────────────────────
  buildCalendar();
</script>
</body>
</html>
